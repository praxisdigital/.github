name: "Feature request"
description: "Create a new feature"
type: "Feature"
body:
  - type: input
    attributes:
      label: "Moodle Version"
      description: "Which Moodle version is this feature for?"
    validations:
      required: true
  - type: textarea
    attributes:
      label: "Describe the feature"
      description: "A clear and concise description of what the feature is."
    validations:
      required: true
  - type: upload
    attributes:
      label: "Screenshots/videos/Figma"
      description: "If applicable, add screenshots/figma links to show the new feature."
    validations:
      required: false
  - type: input
    attributes:
      label: "Ticket link"
      description: "Add a link to the HubSpot ticket"
    validations:
      required: false
  - type: textarea
    attributes:
      label: "Related issues"
    validations:
      required: false
