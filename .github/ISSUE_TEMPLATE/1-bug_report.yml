name: "Bug report"
description: "Create a report to help us improve"
type: Bug
body:
  - type: input
    attributes:
      label: "Moodle Version"
      description: "On which Moodle version was this bug found?"
    validations:
      required: true
  - type: textarea
    attributes:
      label: "Describe the bug"
      description: "A clear and concise description of what the bug is."
    validations:
      required: true
  - type: textarea
    attributes:
      label: "To Reproduce"
      description: "Steps to reproduce the behavior."
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: false
  - type: textarea
    attributes:
      label: "Current behavior"
      description: "A clear and concise description of what currently happens."
    validations:
      required: false
  - type: textarea
    attributes:
      label: "Expected behavior"
      description: "A clear and concise description of what you expected to happen."
    validations:
      required: false
  - type: textarea
    attributes:
      label: "Screenshots/videos"
      description: "If applicable, add screenshots to help explain your problem."
    validations:
      required: false
  - type: input
    attributes:
      label: "Ticket link"
      description: "Add a link to the HubSpot ticket"
    validations:
      required: false
  - type: textarea
    attributes:
      label: "Related issues"
    validations:
      required: false
